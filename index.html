<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Faire-Part – Raneda & Abdelmalek</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=Alex+Brush&family=Jost&display=swap" rel="stylesheet">

<style>
:root{
--kaki:#5c6b3a;--sage:#8fa67b;--ecru:#f4f0e6;--linen:#f9f6ef;
}
body{margin:0;font-family:'Jost';background:#1e2510;color:#333;overflow:hidden}

#scene{height:100vh;display:flex;align-items:center;justify-content:center}
#envelope-wrap{cursor:pointer;text-align:center}

#seal{font-size:14px;color:#fff;opacity:.8}

/* INVITATION */
#invitation{position:fixed;inset:0;background:var(--linen);transform:translateY(100%);transition:1s;overflow:auto}
body.open #invitation{transform:translateY(0)}

.header{text-align:center;padding:40px;background:#3e4a27;color:#fff}
.header h1{font-family:'Alex Brush';font-size:60px;margin:0}

.section{padding:25px;text-align:center}

/* COUNTDOWN */
#countdown{font-size:18px;margin-top:10px;color:var(--kaki)}

/* VIDEO */
.video-container{margin:20px auto;max-width:90%}
.video-container video{width:100%;border-radius:8px}

/* RSVP */
input,select,button{width:90%;margin:8px auto;padding:12px;border-radius:6px;border:1px solid #ccc;font-size:14px}
button{background:var(--kaki);color:#fff;border:none}

</style>
</head>
<body>

<div id="scene">
  <div id="envelope-wrap" onclick="openEnvelope()">
    <div id="seal">👉 Touchez pour ouvrir</div>
  </div>
</div>

<div id="invitation">
  <div class="header">
    <h1>Raneda & Abdelmalek</h1>
    <p>Vous invitent à leur mariage</p>
    <div id="countdown"></div>
  </div>

  <div class="section">
    <h2>📅 Samedi 24 Octobre 2026 - 19h</h2>
    <p>Alger, Algérie</p>
  </div>

  <!-- VIDEO -->
  <div class="section video-container">
    <video controls>
      <source src="video.mp4" type="video/mp4">
    </video>
  </div>

  <div class="section">
    <h2>Programme</h2>
    <p>Accueil - Cérémonie - Dîner - Soirée</p>
  </div>

  <div class="section">
    <h2>RSVP</h2>
    <input id="name" placeholder="Nom">
    <select id="presence" onchange="toggleNb()">
      <option value="">Présence</option>
      <option value="oui">Présent</option>
      <option value="oui-accompagne">Avec accompagnant</option>
      <option value="famille">Famille</option>
      <option value="non">Absent</option>
    </select>
    <input id="nb" type="number" placeholder="Nombre" style="display:none">
    <button onclick="submitRSVP()">Envoyer</button>
  </div>
</div>

<script>
let opened=false;

function openEnvelope(){
if(opened) return;
opened=true;
document.body.classList.add('open');
playSound();
}

function playSound(){
const audio=new Audio('open.mp3');
audio.play();
}

function toggleNb(){
const val=document.getElementById('presence').value;
document.getElementById('nb').style.display=(val==='famille'||val==='oui-accompagne')?'block':'none';
}

function submitRSVP(){
alert('RSVP enregistré (simulation)');
}

// COUNTDOWN
const target=new Date('2026-10-24T19:00:00');
setInterval(()=>{
const now=new Date();
const diff=target-now;
if(diff<0) return;
const d=Math.floor(diff/1000/60/60/24);
const h=Math.floor(diff/1000/60/60)%24;
const m=Math.floor(diff/1000/60)%60;
const s=Math.floor(diff/1000)%60;
document.getElementById('countdown').innerHTML=
`⏳ ${d}j ${h}h ${m}m ${s}s`;
},1000);
</script>

</body>
</html>
